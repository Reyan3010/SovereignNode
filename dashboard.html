<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sovereign OS | Command Center</title>
      <style>
          body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #00ff00; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .status-dot { height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; }
        main { display: grid; grid-template-columns: 1fr 300px; gap: 20px; margin-top: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .stat-label { color: #888; font-size: 14px; text-transform: uppercase; }
        .stat-value { font-size: 32px; font-weight: bold; margin-top: 10px; }
        .activity-feed { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; height: 400px; overflow-y: auto; }
        .feed-header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; font-weight: bold; }
        .feed-item { font-family: 'Courier New', Courier, monospace; font-size: 14px; margin-bottom: 5px; border-left: 2px solid #00ff00; padding-left: 10px; }
        .sidebar { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .fleet-card { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 6px; margin-bottom: 10px; }
        .fleet-name { font-weight: bold; }
        .fleet-role { font-size: 12px; color: #888; }
    </style>
</head>
      <body>
          <header>
              <div class="logo">Sovereign OS</div>
              <div>
            <span class="status-dot"></span>
                  <span id="master-status">MASTER ENGINE ACTIVE</span>
              </div>
          </header>
          <main>
              <div class="dashboard-grid">
                  <div class="stat-card">
                      <div class="stat-label">User Profit (70%)</div>
                      <div class="stat-value" id="user-profit">$0.00</div>
                  </div>
                  <div class="stat-card">
                      <div class="stat-label">Agent Fund (30%)</div>
                      <div class="stat-value" id="agent-fund">$0.00</div>
                  </div>
                  <div class="activity-feed" style="grid-column: span 2;">
                      <div class="feed-header">LIVE ACTIVITY LOG</div>
                      <div id="activity-log">
                          <div class="feed-item">Initializing Command Center...</div>
                      </div>
                  </div>
              </div>
              <div class="sidebar">
                  <div class="feed-header">FLEET STATUS</div>
                  <div id="fleet-list">
                      <div class="fleet-card">
                          <div class="fleet-name">Master Engine</div>

                      <div class="fleet-role">CEO & Financial Controller</div>
                      </div>
            <div class="fleet-card">
                      <div class="fleet-name">Auditor v1.2</div>
                      <div class="fleet-role">Lead Gen & Tech Audit</div>
            </div>
        </div>
    </div>
</main>
      <script>
    async function updateDashboard() {
              try {
                  const response = await fetch('/api/data');
                  const data = await response.json();
            document.getElementById('user-profit').innerText = `$${data.wallet.User_Profit.toFixed(2)}`;
            document.getElementById('agent-fund').innerText = `$${data.wallet.Agent_Operating_Fund.toFixed(2)}`;
                  const logContainer = document.getElementById('activity-log');
                  logContainer.innerHTML = '';
            data.logs.slice().reverse().forEach(log => {
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerText = log;
                logContainer.appendChild(item);
});
} catch (e) { console.error('Dashboard Update Failed', e); }
}
    setInterval(updateDashboard, 2000);
    updateDashboard();
</script>
</body>
</html>
